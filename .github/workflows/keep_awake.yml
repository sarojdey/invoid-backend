name: Keep Render Awake
on:
  schedule:
    # Runs every 10 mins from 03:30 to 17:30 UTC (9:00 AM to 11:00 PM IST)
    - cron: '*/10 3-17 * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: curl -s https://invoid-backend-api-hosted-in-render.onrender.com/api/health