name: Keep Render Awake
on:
  workflow_dispatch:      # <--- This adds the "Run workflow" button
  schedule:
    - cron: '*/7 3-17 * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: curl -s https://invoid-backend-api-hosted-in-render.onrender.com/api/health